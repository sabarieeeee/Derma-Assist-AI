<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derma Assist AI — Your Trusted Compass for AI Skin Health</title>
    
    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      .font-geist { font-family: 'Geist', sans-serif !important; }
      body { font-family: 'Inter', sans-serif; background-color: #e3e8dc; margin: 0; padding: 0; }

      /* Liquid Glass Dynamic Effect Class */
      .liquid-glass-card {
        position: relative;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .liquid-glass-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0.03) 40%,
          rgba(200, 245, 66, 0.08) 60%,
          transparent 100%
        );
        transform: rotate(30deg);
        pointer-events: none;
        transition: opacity 0.5s ease;
        opacity: 0.6;
      }

      .liquid-glass-card:hover::before {
        opacity: 1;
      }

      .liquid-glass-card-lime {
        position: relative;
        background: rgba(200, 245, 66, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(200, 245, 66, 0.35);
        box-shadow: 0 20px 40px -12px rgba(10, 42, 18, 0.45);
        overflow: hidden;
      }

      /* Custom Dark Scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(10, 42, 18, 0.5);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(200, 245, 66, 0.5);
      }
    </style>
  </head>
  <body class="min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
